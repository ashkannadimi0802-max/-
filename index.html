<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>محاسبه‌گر سود سرمایه‌گذاری | آریا راهبرد نیرو</title>
    
    <!-- Tailwind CSS Play CDN -->
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    
    <!-- jsPDF -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/3.0.3/jspdf.umd.min.js"></script>
    
    <!-- Vazirmatn Font (Persian font) -->
    <link href="https://fonts.googleapis.com/css2?family=Vazirmatn:wght@400;500;700&display=swap" rel="stylesheet">

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Vazirmatn:wght@400;500;700&display=swap');
        
        body {
            font-family: 'Vazirmatn', system-ui, -apple-system, sans-serif;
        }
        
        .glass {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(16px);
        }
        
        input[type="number"] {
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
        }
        
        input[type="number"]:focus {
            box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.3);
        }
        
        .result-value {
            font-variant-numeric: tabular-nums;
        }
    </style>
</head>
<body class="bg-gradient-to-br from-slate-50 to-blue-50 min-h-screen py-8">
    <div class="max-w-4xl mx-auto px-4">
        <!-- Header -->
        <div class="flex items-center justify-between mb-8">
            <div class="flex items-center gap-4">
                <div class="w-12 h-12 bg-blue-600 rounded-2xl flex items-center justify-center text-white text-2xl font-bold shadow-lg">آر</div>
                <div>
                    <h1 class="text-3xl font-bold text-slate-800">آریا راهبرد نیرو</h1>
                    <p class="text-slate-600 text-sm">طرح بهینه‌سازی روشنایی</p>
                </div>
            </div>
            <div class="text-right">
                <p class="text-xs text-slate-500">محاسبه‌گر حرفه‌ای سرمایه‌گذاری</p>
            </div>
        </div>

        <div class="grid grid-cols-1 lg:grid-cols-5 gap-8">
            <!-- Input Card -->
            <div class="lg:col-span-2">
                <div class="glass rounded-3xl shadow-xl border border-white p-8 sticky top-6">
                    <h2 class="text-2xl font-semibold text-slate-800 mb-6">محاسبه سود سرمایه‌گذاری</h2>
                    
                    <div class="space-y-6">
                        <div>
                            <label class="block text-sm font-medium text-slate-600 mb-2">مبلغ سرمایه‌گذاری (تومان)</label>
                            <div class="relative">
                                <input id="investment" 
                                       type="number" 
                                       value="50000000000"
                                       class="w-full bg-white border border-slate-200 focus:border-blue-500 rounded-2xl px-5 py-4 text-lg outline-none">
                                <span class="absolute left-5 top-1/2 -translate-y-1/2 text-slate-400 text-sm">تومان</span>
                            </div>
                        </div>

                        <div>
                            <label class="block text-sm font-medium text-slate-600 mb-2">نرخ تنزیل (%)</label>
                            <input id="discount" 
                                   type="number" 
                                   value="30"
                                   class="w-full bg-white border border-slate-200 focus:border-blue-500 rounded-2xl px-5 py-4 text-lg outline-none">
                        </div>

                        <div>
                            <label class="block text-sm font-medium text-slate-600 mb-2">مدت پروژه (سال)</label>
                            <input id="years" 
                                   type="number" 
                                   value="7"
                                   class="w-full bg-white border border-slate-200 focus:border-blue-500 rounded-2xl px-5 py-4 text-lg outline-none">
                        </div>

                        <button onclick="calculate()" 
                                class="w-full bg-blue-600 hover:bg-blue-700 transition-all text-white font-semibold text-lg py-5 rounded-2xl shadow-lg shadow-blue-500/30 flex items-center justify-center gap-3">
                            <span>محاسبه سود</span>
                            <svg xmlns="http://www.w3.org/2000/svg" class="w-6 h-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M14 5l7 7-7 7M5 12h14" />
                            </svg>
                        </button>

                        <button onclick="generatePDF()" 
                                id="pdfBtn"
                                class="w-full border border-slate-300 hover:border-slate-400 transition-all text-slate-700 font-medium py-4 rounded-2xl flex items-center justify-center gap-2 hidden">
                            <svg xmlns="http://www.w3.org/2000/svg" class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 17h2a2 2 0 002-2v-4a2 2 0 00-2-2H3a2 2 0 00-2 2v4a2 2 0 002 2h2m2 4h6a2 2 0 002-2v-4a2 2 0 00-2-2H9a2 2 0 00-2 2v4a2 2 0 002 2z" />
                            </svg>
                            <span>دانلود گزارش PDF</span>
                        </button>
                    </div>
                </div>
            </div>

            <!-- Results -->
            <div class="lg:col-span-3">
                <div id="result" class="glass rounded-3xl shadow-xl border border-white p-8 min-h-[500px]">
                    <!-- Results populated by JS -->
                </div>
            </div>
        </div>

        <!-- Footer Info -->
        <div class="mt-12 text-center text-xs text-slate-500">
            این محاسبه‌گر صرفاً جنبه اطلاع‌رسانی دارد. برای سرمایه‌گذاری واقعی با کارشناسان آریا راهبرد نیرو مشورت کنید.
        </div>
    </div>

    <script>
        // Initialize Tailwind
        function initTailwind() {
            // Already handled by CDN
        }

        function formatNumber(num) {
            return Math.round(num).toLocaleString('fa-IR');
        }

        function calculate() {
            const totalProject = 2500000000000;
            const totalShares = 1000;
            const totalProfit = 17500000000000;

            let investment = Number(document.getElementById("investment").value) || 0;
            let discount = Number(document.getElementById("discount").value) / 100 || 0;
            let years = Number(document.getElementById("years").value) || 1;

            if (investment <= 0 || years <= 0) {
                alert("لطفاً مقادیر معتبر وارد کنید");
                return;
            }

            let sharePrice = totalProject / totalShares;
            let shares = investment / sharePrice;
            let ownership = shares / totalShares;
            let profit = ownership * totalProfit;
            let annualProfit = profit / years;
            let netProfit = profit - investment;
            let roi = ((profit - investment) / investment) * 100;
            let cagr = (Math.pow(profit / investment, 1 / years) - 1) * 100;

            // Present Value of Annuity
            let pv = annualProfit * ((1 - Math.pow(1 + discount, -years)) / discount);

            const resultHTML = `
                <div class="flex justify-between items-center mb-8">
                    <h2 class="text-3xl font-bold text-slate-800">نتایج محاسبه</h2>
                    <div class="text-right">
                        <p class="text-sm text-emerald-600 font-medium">پروژه بهینه‌سازی روشنایی</p>
                    </div>
                </div>

                <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                    <!-- Key Metrics -->
                    <div class="bg-white rounded-2xl p-6 border border-slate-100">
                        <p class="text-slate-500 text-sm">تعداد سهم</p>
                        <p class="text-4xl font-bold text-slate-800 mt-1 result-value">${shares.toFixed(2)}</p>
                    </div>
                    <div class="bg-white rounded-2xl p-6 border border-slate-100">
                        <p class="text-slate-500 text-sm">درصد مالکیت</p>
                        <p class="text-4xl font-bold text-blue-600 mt-1 result-value">${(ownership*100).toFixed(2)}%</p>
                    </div>
                </div>

                <div class="mt-8 space-y-6">
                    <div class="flex justify-between items-center py-4 border-b">
                        <span class="text-slate-600">سهم از سود کل پروژه</span>
                        <span class="font-bold text-xl text-emerald-600">${formatNumber(profit)} تومان</span>
                    </div>
                    <div class="flex justify-between items-center py-4 border-b">
                        <span class="text-slate-600">سود سالانه</span>
                        <span class="font-bold text-xl">${formatNumber(annualProfit)} تومان</span>
                    </div>
                    <div class="flex justify-between items-center py-4 border-b">
                        <span class="text-slate-600">سود خالص</span>
                        <span class="font-bold text-2xl ${netProfit > 0 ? 'text-emerald-600' : 'text-red-600'}">${formatNumber(netProfit)} تومان</span>
                    </div>
                    <div class="flex justify-between items-center py-4 border-b">
                        <span class="text-slate-600">بازده کل (ROI)</span>
                        <span class="font-bold text-xl">${roi.toFixed(2)}%</span>
                    </div>
                    <div class="flex justify-between items-center py-4 border-b">
                        <span class="text-slate-600">بازده مرکب سالانه (CAGR)</span>
                        <span class="font-bold text-xl">${cagr.toFixed(2)}%</span>
                    </div>
                    <div class="flex justify-between items-center py-4">
                        <span class="text-slate-600">ارزش فعلی خالص سودها (NPV)</span>
                        <span class="font-bold text-2xl text-violet-600">${formatNumber(pv)} تومان</span>
                    </div>
                </div>

                <div class="mt-10 pt-6 border-t text-xs text-slate-500 flex items-center gap-2">
                    <div class="w-2 h-2 bg-emerald-500 rounded-full animate-pulse"></div>
                    محاسبات بر اساس اطلاعات پروژه آریا راهبرد نیرو
                </div>
            `;

            document.getElementById("result").innerHTML = resultHTML;
            document.getElementById("pdfBtn").classList.remove("hidden");
            
            // Save data for PDF
            window.lastCalculation = {
                investment,
                discount: discount * 100,
                years,
                shares: shares.toFixed(2),
                ownership: (ownership*100).toFixed(2),
                profit,
                annualProfit,
                netProfit,
                roi: roi.toFixed(2),
                cagr: cagr.toFixed(2),
                pv
            };
        }

        function generatePDF() {
            if (!window.lastCalculation) {
                alert("ابتدا محاسبه را انجام دهید");
                return;
            }

            const { jsPDF } = window.jspdf;
            const doc = new jsPDF({
                orientation: "portrait",
                unit: "mm",
                format: "a4"
            });

            const data = window.lastCalculation;
            const pageWidth = doc.internal.pageSize.getWidth();

            // Header
            doc.setFillColor(30, 64, 175);
            doc.rect(0, 0, pageWidth, 35, "F");
            
            doc.setTextColor(255, 255, 255);
            doc.setFont("helvetica", "bold");
            doc.setFontSize(22);
            doc.text("آریا راهبرد نیرو", pageWidth/2, 18, { align: "center" });
            
            doc.setFontSize(14);
            doc.text("گزارش محاسبه سود سرمایه‌گذاری طرح بهینه‌سازی روشنایی", pageWidth/2, 28, { align: "center" });

            // Content
            doc.setTextColor(0, 0, 0);
            doc.setFontSize(12);
            let y = 50;

            doc.text(`تاریخ گزارش: ${new Date().toLocaleDateString('fa-IR')}`, 20, y);
            y += 10;

            doc.setFont("helvetica", "bold");
            doc.text("اطلاعات ورودی:", 20, y);
            y += 8;
            doc.setFont("helvetica", "normal");
            
            doc.text(`مبلغ سرمایه‌گذاری: ${data.investment.toLocaleString('fa-IR')} تومان`, 20, y);
            y += 8;
            doc.text(`نرخ تنزیل: ${data.discount}%`, 20, y);
            y += 8;
            doc.text(`مدت پروژه: ${data.years} سال`, 20, y);
            y += 15;

            // Results
            doc.setFont("helvetica", "bold");
            doc.text("نتایج محاسبه:", 20, y);
            y += 10;
            doc.setFont("helvetica", "normal");

            const results = [
                [`تعداد سهم:`, `${data.shares}`],
                [`درصد مالکیت:`, `${data.ownership}%`],
                [`سهم از سود پروژه:`, `${Math.round(data.profit).toLocaleString('fa-IR')} تومان`],
                [`سود سالانه:`, `${Math.round(data.annualProfit).toLocaleString('fa-IR')} تومان`],
                [`سود خالص:`, `${Math.round(data.netProfit).toLocaleString('fa-IR')} تومان`],
                [`بازده کل (ROI):`, `${data.roi}%`],
                [`بازده مرکب سالانه (CAGR):`, `${data.cagr}%`],
                [`ارزش فعلی سودها:`, `${Math.round(data.pv).toLocaleString('fa-IR')} تومان`]
            ];

            results.forEach(([label, value]) => {
                doc.text(label, 20, y);
                doc.text(value, pageWidth - 30, y, { align: "right" });
                y += 10;
            });

            // Footer
            doc.setFontSize(10);
            doc.text("این گزارش توسط ماشین حساب آنلاین آریا راهبرد نیرو تولید شده است.", pageWidth/2, 280, { align: "center" });
            doc.text("برای اطلاعات بیشتر با ما تماس بگیرید.", pageWidth/2, 287, { align: "center" });

            // Save
            doc.save(`گزارش_سرمایه_گذاری_آریا_راهبرد_${new Date().toISOString().slice(0,10)}.pdf`);
        }

        // Auto calculate on load
        window.onload = function() {
            calculate();
        };
    </script>
</body>
</html>
